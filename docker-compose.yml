version: "3.9"

# Local development only — starts Postgres + Redis so you can run the
# coordinator binary without needing cloud credentials.
#
# Usage:
#   docker compose up -d
#   cargo run -p coordinator   (reads .env.dev automatically)
#   cd dashboard && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pinaivu
      POSTGRES_PASSWORD: pinaivu
      POSTGRES_DB: pinaivu
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinaivu"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
